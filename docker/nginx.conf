server {
    listen 443 ssl;
    server_name localhost angular-ui-web;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Use Docker's internal DNS; resolve upstream per-request so nginx starts
    # even if the BFF container isn't up yet.
    resolver 127.0.0.11 valid=10s;
    set $bff https://spring-boot-web-bff:8080;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy BFF endpoints: /api/, /login, /login/oauth2/code/, /logout, /oauth2/
    location ~ ^/(api|login|logout|oauth2)(/.*)?$ {
        proxy_pass                      $bff;
        proxy_ssl_verify                on;
        proxy_ssl_trusted_certificate   /etc/nginx/certs/rootCA.pem;
        proxy_set_header        Host                $host;
        proxy_set_header        X-Forwarded-Host    $host;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        proxy_set_header        X-Forwarded-Port    443;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name localhost angular-ui-web;
    return 301 https://$host$request_uri;
}